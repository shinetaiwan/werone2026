<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WE R ONE 2026 臺南場團報管理後台</title>
  <style>
    /* =========================================
       1. 全域變數與基礎樣式
       ========================================= */
    :root {
      --shine-lime: #00ff7f;   /* 亮綠色 */
      --shine-black: #1a1a1a;  /* 黑色 */
      --shine-bg: #ffffff;     /* 白色背景 */
      --shine-light: #f4f7f5;  /* 淺灰色背景 */
      --shine-gray: #d1d1d1;   /* 灰色線條 */
      --shine-red: #ff4d4d;    /* 警告紅色 */
      --shine-blue: #3498db;   /* 分組藍色 */
    }

    body { 
      font-family: "Inter", "Noto Sans TC", sans-serif; 
      background-color: #f0f0f0; 
      margin: 0; 
      padding: 10px; 
    }

    .container {
      max-width: 1300px; 
      margin: 20px auto; 
      background: var(--shine-bg);
      padding: clamp(20px, 4vw, 40px); 
      border: 3px solid var(--shine-black);
      box-shadow: 12px 12px 0px var(--shine-black); 
      box-sizing: border-box;
      position: relative;
    }

    /* =========================================
       2. 表單與輸入元件
       ========================================= */
    .form-section { 
      border: 2px solid var(--shine-black); 
      padding: 20px; 
      background: var(--shine-light); 
      margin-bottom: 30px; 
    }

    .section-title { 
      display: inline-block; 
      background: var(--shine-black); 
      color: var(--shine-lime); 
      padding: 5px 20px; 
      font-weight: 900; 
      font-size: 1.1em; 
      margin-bottom: 20px; 
      margin-top: -35px; 
      border: 2px solid var(--shine-black); 
      box-shadow: 4px 4px 0px var(--shine-lime);
    }

    input, select, textarea { 
      border: 2px solid var(--shine-black); 
      padding: 12px; 
      font-size: 16px; 
      width: 100%; 
      box-sizing: border-box; 
      margin-top: 5px; 
    }

    label { 
      font-weight: 900; 
      background: var(--shine-lime); 
      padding: 2px 10px; 
      display: inline-block;
    }

    /* =========================================
       3. 按鈕樣式
       ========================================= */
    .btn { 
      padding: 12px 25px; 
      font-weight: 900; 
      border: 2px solid var(--shine-black); 
      cursor: pointer; 
      display: inline-flex; 
      align-items: center; 
      justify-content: center; 
      text-transform: uppercase; 
      text-decoration: none; 
      transition: all 0.1s ease;
    }

    /* 分頁切換按鈕 - 預設 */
    .btn-next { 
      background: var(--shine-bg); 
      color: var(--shine-black); 
    }

    /* 分頁切換按鈕 - 懸停與啟動狀態 */
    .btn-next:hover, .btn-next.active { 
      background: var(--shine-black); 
      color: var(--shine-lime); 
      box-shadow: 6px 6px 0px var(--shine-black); 
      transform: translate(-3px, -3px); 
    }

    /* 儲存動作專用按鈕 (紅色) */
    .btn-save-action {
      width: 100%;
      background: var(--shine-red) !important;
      color: white !important;
      border: 2px solid var(--shine-black);
      box-shadow: 6px 6px 0px var(--shine-black);
      font-size: 1.2em;
      font-weight: 900;
      cursor: pointer;
    }

    .btn-save-action:active {
      transform: translate(2px, 2px);
      box-shadow: 4px 4px 0px var(--shine-black);
    }

    /* =========================================
       4. 卡片與清單元件 (編組/編寢)
       ========================================= */
    .item-card {
      background: var(--shine-bg);
      border: 3px solid var(--shine-black);
      padding: 15px;
      cursor: pointer;
      transition: all 0.1s ease;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .item-card:hover {
      transform: translate(-4px, -4px);
      box-shadow: 8px 8px 0px var(--shine-black);
    }

    .item-card.active-group { border-color: var(--shine-blue); box-shadow: 6px 6px 0px var(--shine-blue); }
    .item-card.active-room { border-color: var(--shine-lime); box-shadow: 6px 6px 0px var(--shine-lime); }

    .card-header {
      border-bottom: 2px solid var(--shine-black);
      padding-bottom: 10px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .member-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px dashed var(--shine-gray);
      font-weight: 700;
      font-size: 14px;
    }

    .empty-placeholder {
      color: var(--shine-gray);
      font-size: 13px;
      text-align: center;
      padding: 20px 0;
      font-style: italic;
    }

    /* 編寢名單池樣式 */
    .member-pool { background: #333; padding: 15px; border: 3px solid black; min-height: 400px; }
    .pool-item { 
      background: white; border: 2px solid black; padding: 8px 12px; 
      margin-bottom: 8px; font-weight: 800; cursor: grab; 
      display: flex; justify-content: space-between; 
    }

    .status-tag { 
      font-size: 10px; padding: 2px 5px; 
      background: var(--shine-black); color: var(--shine-lime); 
      margin-left: 5px; 
    }

    /* =========================================
       5. 佈局控制
       ========================================= */
    .hidden { display: none !important; }
    
    .tab-container {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .grid-display-area {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      align-content: start;
    }

    .dorm-grid { 
      display: grid; 
      grid-template-columns: 1fr 2fr; 
      gap: 20px; 
      margin-top: 20px; 
    }

    /* =========================================
       6. 儲存條 (Save Bar) 與動畫
       ========================================= */
    .save-bar {
      position: sticky;
      bottom: 10px;
      padding: 15px 20px;
      z-index: 100;
      margin-top: 20px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(5px);
      border: 3px solid var(--shine-black);
      border-top: 5px solid var(--shine-black);
      transition: all 0.3s ease;
      box-sizing: border-box;
    }

    /* 內容淡入動畫 */
    .tab-content { 
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 💡 警告閃爍動畫：用於 switchTab 攔截時 */
    @keyframes shake-red {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .shake-alert {
      animation: shake-red 0.4s ease-in-out;
      outline: 4px solid var(--shine-red) !important;
      border-color: var(--shine-red) !important;
    }
    /* =========================================
   修正：成員資料彈窗專用排版
   ========================================= */

/* 1. 調整彈窗背景與捲動行為 */
#editModal {
  padding: 40px 10px !important; /* 增加上下留白，避免貼齊邊緣 */
}

/* 2. 彈窗內的 container：縮小寬度使其更像對話框 */
#editModal > .container {
  max-width: 900px !important;
  border: 4px solid var(--shine-black) !important;
  background: var(--shine-bg) !important;
  box-shadow: 20px 20px 0px var(--shine-black) !important;
  padding: 30px !important;
}

/* 3. 核心：找回一排兩欄 (grid-row) */
#editModal .grid-row {
  display: grid !important;
  /* 強制設定為兩欄，除非螢幕太小 */
  grid-template-columns: repeat(2, 1fr) !important; 
  gap: 15px 25px !important; /* 垂直 15px, 水平 25px */
}

/* 4. 針對「營會行政」最後一個長欄位的修正 */
/* 你的 HTML 裡有寫 grid-column: 1 / -1，這裡補強確保它佔滿兩欄 */
#editModal .form-group[style*="grid-column: 1 / -1"] {
  grid-column: span 2 !important;
}

/* 5. 標題與間距微調 */
#editModal h2 {
  margin-bottom: 40px;
  font-size: 1.8em;
  border-bottom: 4px double var(--shine-black);
  padding-bottom: 10px;
}

#editModal .form-section {
  margin-bottom: 40px !important;
  position: relative;
}

/* 讓手機版自動變回一欄 */
@media (max-width: 700px) {
  #editModal .grid-row {
    grid-template-columns: 1fr !important;
  }
  #editModal .form-group[style*="grid-column: 1 / -1"] {
    grid-column: span 1 !important;
  }
}

/* 必填欄位的小紅邊框提示 */
#editModal .v-req:focus {
  border-color: var(--shine-lime);
  outline: none;
  box-shadow: 4px 4px 0px var(--shine-black);
}
</style>
</head>
<body>

  <div class="container" id="auth-block">
    <div style="text-align:center; margin-bottom:30px;">
      <h1 style="font-weight:900;">WE R ONE 2026 臺南場團報管理後台</h1>
      <p>請輸入您的窗口報名資料以啟動管理權限</p>
    </div>
    <div class="form-section" style="max-width: 500px; margin: 0 auto;">
      <div class="section-title">窗口資料驗證</div>

  <div class="container hidden" id="admin-dashboard">
    <div class="section-title" id="admin-welcome">管理介面</div>
    
    <div style="display:flex; gap:10px; margin-bottom:20px; flex-wrap: wrap;">
  <button class="btn btn-next" id="btn-tab-edit" onclick="switchTab('edit')">資料修改</button>
  <button class="btn" id="btn-tab-dorm" onclick="switchTab('dorm')">編寢作業</button>

</div>

    
    <div id="tab-edit-content">
       <div class="form-section">
         <div class="section-title">成員名單</div>

       </div>
    </div>

    <div id="tab-dorm-content" class="hidden">
  <div style="display: grid; grid-template-columns: 350px 1fr; gap: 20px; align-items: start;">
    
    <div class="member-pool" style="position: sticky; top: 10px; max-height: 90vh; overflow-y: auto;">
      <div style="color:var(--shine-lime); font-weight:900; margin-bottom:10px; border-bottom:2px solid var(--shine-lime);">
        待編寢成員 (選定房間後點擊姓名入住)

</div>

  <div id="tab-group-content" class="hidden">
  <div style="display: grid; grid-template-columns: 350px 1fr; gap: 20px; align-items: start;">
    <div class="member-pool" style="position: sticky; top: 10px; max-height: 80vh; overflow-y: auto; background: #2c3e50;">
      <div style="color:#ecf0f1; font-weight:900; margin-bottom:10px; border-bottom:2px solid #3498db; padding:5px;">
        待編組成員 (選定小組後點擊姓名加入)

        <div id="group-focus-info" style="font-weight:900; color:#2980b9; background:white; padding:5px 15px; border:2px solid black;">

      <div id="group-grid-display" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px;">
        </div>
    </div>
  </div>
  
  <div id="group-save-bar" class="save-bar hidden">
  <button class="btn btn-save-action" onclick="saveBatchData(this)">
    💾 確定編組完成，寫入資料庫
  </button>
</div>
</div>
      
  <div id="tab-role-content" class="hidden">
  <div class="form-section">
    <div class="section-title">隊輔管理</div>
    <div id="role-management-display" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">

  <div id="editModal" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; overflow-y: auto; padding: 20px 0;">
    <div class="container" style="max-width: 900px; margin: auto; position: relative;">
      <button onclick="closeModal()" style="position: absolute; right: 20px; top: 20px; background: var(--shine-red); color: white; border: 2px solid black; padding: 5px 15px; cursor: pointer;">關閉 X</button>

      <input type="hidden" id="edit-row-index">
      
      <div class="form-section">

        <div class="grid-row">
          <div class="form-group"><label>姓名</label><input type="text" id="m-name" class="v-req"></div>
          <div class="form-group"><label>性別</label><select id="m-gender" class="v-req"><option>男</option><option>女</option></select></div>

      <div class="form-section">
        <div class="section-title">參與身分</div>

          <div class="form-group"><label>報名身分</label><select id="m-role" class="v-req"><option>國中</option><option>高中職</option><option>大專</option><option>社青</option><option>傳道</option><option>牧師</option></select></div>

          <div class="form-group"><label>升上年級</label><input type="text" id="m-grade" class="v-req"></div>
          <div class="form-group"><label>所屬教會</label><input type="text" id="m-church" class="v-req"></div>
          <div class="form-group"><label>是否為基督徒</label><select id="m-isChristian" class="v-req"><option>是</option><option>否</option></select></div>
          <div class="form-group"><label>是否已受洗</label><select id="m-isBaptized" class="v-req"><option>是</option><option>否</option></select></div>

      </div>

      <div class="form-section">
        <div class="section-title">緊急聯絡人</div>

          <div class="form-group"><label>緊急聯絡人</label><input type="text" id="m-iceName" class="v-req"></div>
          <div class="form-group"><label>緊急連絡人關係</label><input type="text" id="m-iceRel" class="v-req"></div>
          <div class="form-group"><label>緊急聯絡人電話</label><input type="tel" id="m-icePhone" maxlength="11" oninput="formatPhone(this)" class="v-req"></div>

          <div class="form-group" style="grid-column: 1 / -1;"><label>特殊狀況與注意事項</label><input type="text" id="m-medical" class="v-req"></div>

      <div style="text-align: center;"><button class="btn btn-next" onclick="submitEdit(this)">確認儲存修改</button></div>

<script>

const API_URL = 'https://script.google.com/macros/s/AKfycbyGVqa64Yk66or8SdLV4VuX5YC1Zi-7CWbPNY9O8PXLyHmXFjj7KRhT73HKImigCeCl/exec';

async function callApi(action, payload) {
  const response = await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify({ action: action, payload: payload })
  });
  const res = await response.json();
  if (!res.success) throw new Error(res.message);
  return res.data;
}
  
  // 1. 在 script 開頭定義變數
  let isDirty = false;
  let isModalDirty = false; // 💡 新增全域變數
  let currentUser = "";
  let currentPhone = ""; // 新增這行
  let fullData = [];
  let activeRoom = null; 
  let virtualRooms = []; 
  let changedRows = new Map();
  let activeGroup = null;
  let virtualGroups = []; // 存儲手動新增的小組名稱

  // 1. 手機自動格式化 0900-000000 (修正版)
  function formatPhone(obj) {
    let val = obj.value.replace(/\D/g, ''); // 只留數字
    if (val.length > 10) val = val.slice(0, 10);
    
    if (val.length > 4) {
      obj.value = val.slice(0, 4) + '-' + val.slice(4);
    } else {
      obj.value = val;
    }
  }

  // 2. 驗證登入
  async function handleAuth() {
  const name = document.getElementById('w_name').value.trim();
  const phone = document.getElementById('w_phone').value.trim();
  const email = document.getElementById('w_email').value.trim();

  if (!name || !phone || !email) {
    alert("請完整填寫驗證資訊");
    return;
  }

  // 取得按鈕並進入讀取狀態
  const btn = document.querySelector('#auth-block button');
  const originalText = btn.innerText;
  btn.innerText = "⏳ 驗證中...";
  btn.disabled = true;

  try {
    // 呼叫 API
    const res = await callApi("verifyWindow", { name, phone, email });

    // 💡 修正點：因為 callApi 內部如果驗證失敗會直接 throw Error 
    // 所以能執行到這行，代表後端一定驗證成功了！
    // 我們不需要判斷 if(res)，因為 res 可能是 undefined (由 callApi 回傳的 res.data 導致)
    
    // 💡 登入成功後，把這兩把鑰匙記下來
    currentUser = name;
    currentPhone = phone; 
    
    // 如果想要重新整理頁面後不用重新登入，可以改存這裡：
    sessionStorage.setItem('adminName', name);
    sessionStorage.setItem('adminPhone', phone);
    
    // 切換 UI
    document.getElementById('auth-block').classList.add('hidden');
    document.getElementById('admin-dashboard').classList.remove('hidden');
    document.getElementById('admin-welcome').innerText = `管理窗口：${currentUser}`;
      
    // 登入後自動載入資料
    loadAllData();

  } catch (err) {
    // 只要驗證失敗 (found=false) 或連線有問題，都會跳到這裡
    console.error("驗證過程錯誤:", err);
    alert("❌ " + err.message); // 這會顯示後端 throw 的 "找不到符合的窗口資料..."
    btn.innerText = originalText;
    btn.disabled = false;
  }
}


  // 3. 載入全體資料
  async function loadAllData() {
  const container = document.getElementById('member-list-container');
  if (container) container.innerHTML = "⏳ 正在從雲端同步資料，請稍候...";

  try {
    // 💡 關鍵修正：優先從 sessionStorage 抓取，確保「重新整理」後仍能自動同步
    const name = sessionStorage.getItem('adminName') || currentUser; 
    const phone = sessionStorage.getItem('adminPhone') || currentPhone; 

    // 安全檢查：如果兩者皆空，代表真的沒登入，應導回登入頁或報錯
    if (!name || !phone) {
      console.error("驗證資訊遺失，無法載入資料");
      if (container) container.innerHTML = "❌ 請先完成登入驗證。";
      return;
    }

    // 呼叫 API
    const res = await callApi("getAdminFullData", { 
      adminName: name, 
      adminPhone: phone 
    });

    // 資料處理 (確保 res 是陣列)

  function updateRoomName(oldName, newName, element) {
  newName = newName.trim();
  // 如果名稱沒變或是空白，直接刷回原狀並結束
  if (!newName || oldName === newName) {
    renderDormInterface(); 
    return;
  }

  // 1. 核心邏輯：抓取畫面上「除了自己以外」的所有房號
  const otherNames = Array.from(document.querySelectorAll('.room-name-input'))
    .filter(input => input !== element) // 💡 關鍵：直接排除掉目前觸發事件的那個 DOM 元素
    .map(input => input.value.trim());

  // 2. 檢查新名稱是否與其他房間衝突
  if (otherNames.includes(newName)) {
    alert(`❌ 房號「${newName}」在目前清單中已存在！`);
    renderDormInterface(); // 刷回原名
    return;
  }

  // 3. 檢查是否存在於原始資料中 (非必要的二次防護)
  const isOriginalExist = fullData.some(m => m.room === newName && m.room !== oldName);
  if (isOriginalExist) {
    alert(`❌ 房號「${newName}」已在資料庫中使用中！`);
    renderDormInterface();
    return;
  }

  console.log(`[房間改名] 從 ${oldName} 改為 ${newName}`);

  // 4. 更新虛擬房間列表 (virtualRooms)
  const vIdx = virtualRooms.indexOf(oldName);
  if (vIdx !== -1) virtualRooms[vIdx] = newName;

  // 5. 同步更新暫存區 (讓房間內的人跟著搬家)
  fullData.forEach(m => {
    const pending = changedRows.get(m.row);
    const currentRoom = (pending && pending.room !== undefined) ? pending.room : m.room;
    
    if (currentRoom === oldName) {
      changedRows.set(m.row, {
        ...(pending || {}),
        row: m.row,
        room: newName,
        _type: 'dorm'
      });
    }
  });

  // 6. 更新狀態
  if (activeRoom === oldName) activeRoom = newName;
  isDirty = true;
  
  const saveBar = document.getElementById('dorm-save-bar');
  if (saveBar) saveBar.classList.remove('hidden');

  // 7. 重新渲染
  renderDormInterface();
}
  
  function setActiveRoom(rNo) {
  activeRoom = rNo;

  // 💡 關鍵修正：計算成員時，必須同時考慮「原始資料」與「尚未存檔的變動」
  const roomMembers = fullData.filter(m => {
    const pending = changedRows.get(m.row);
    // 如果暫存中有 room 資訊，優先用暫存的；否則用原始資料
    const currentRoom = (pending && pending.room !== undefined) ? pending.room : m.room;
    return currentRoom === rNo;
  });

  // 取得該房成員的性別 (同樣優先參考暫存，以防萬一有性別異動)
  let gender = "未定";
  if (roomMembers.length > 0) {
    const firstMember = roomMembers[0];
    const pendingGender = changedRows.get(firstMember.row);
    gender = (pendingGender && pendingGender.gender) ? pendingGender.gender : firstMember.gender;
  }

  // 更新介面提示文字
  const focusInfo = document.getElementById('current-focus-info');
  if (focusInfo) {
    focusInfo.innerHTML = `👉 正在編排：<b style="color:red;">${rNo}</b> 房 (${gender}生)`;
  }

  // 重新渲染編寢介面，確保選取狀態 (Active) 正確套用
  renderDormInterface();
}

function createNewRoom() {
  // 取得目前畫面上所有的房號
  const existingNames = Array.from(document.querySelectorAll('.room-name-input'))
                             .map(i => i.value.trim());

  let i = 1;
  let newName = `新寢室${i}`;
  
  // 只要畫面上有了，就往後跳一號
  while (existingNames.includes(newName)) {
    i++;
    newName = `新寢室${i}`;
  }

  virtualRooms.unshift(newName);
  setActiveRoom(newName);
  
  setTimeout(() => {
    const inputs = document.querySelectorAll('.room-name-input');
    if (inputs.length > 0) {
      inputs[0].focus();
      inputs[0].select();
    }
  }, 100);
}

  // 2. 修改入住函數：移除 google.script.run
function clickToAssign(row, gender) {
  if (!activeRoom) {
    alert("請先點選右側的一個「房間」！");
    return;
  }

  // --- 💡 關鍵修正：計算房間成員時，必須考慮暫存 (changedRows) ---
  const roomMembers = fullData.filter(m => {
    const pending = changedRows.get(m.row);
    // 如果暫存中有 room 資訊，優先用暫存的；否則用原始資料
    const currentRoom = (pending && pending.room !== undefined) ? pending.room : m.room;
    return currentRoom === activeRoom;
  });

  // 檢查性別 (同樣要從暫存中抓取成員的正確性別，以防萬一)
  if (roomMembers.length > 0) {
    const firstMember = roomMembers[0];
    const pendingFirst = changedRows.get(firstMember.row);
    const firstGender = (pendingFirst && pendingFirst.gender) ? pendingFirst.gender : firstMember.gender;

    if (firstGender !== gender) {
      alert(`❌ 性別錯誤！此房間目前為 ${firstGender} 生房。`);
      return;
    }
  }

  // 檢查人數上限 (現在能準確計算「即將入住」的人數了)
  if (roomMembers.length >= 4) {
    alert("❌ 房間已滿 4 人！");
    return;
  }
  // --------------------------------------------------------

  // 執行暫存寫入
  const pending = changedRows.get(row);
  changedRows.set(row, { 
    ...(pending || {}), 
    row: row, 
    room: activeRoom,
    _type: 'dorm' 
  });

  isDirty = true;
  
  const saveBar = document.getElementById('dorm-save-bar');
  if (saveBar) saveBar.classList.remove('hidden');
  
  renderDormInterface();
}

    // 呼叫 API，傳送 row, payload 和當前操作者
    await callApi("updateMultipleColumns", { 
      row: row, 
      p: payload, 
      adminName: sessionStorage.getItem('adminName'), // 從存儲抓
      adminPhone: sessionStorage.getItem('adminPhone') // 從存儲抓
    });

    alert("✅ 資料更新成功！");
    // 💡 關鍵修正：儲存成功，清除髒資料標記
    isDirty = false;
    isModalDirty = false;
    closeModal();
    // 更新成功後，重新從後端抓取最新資料以同步前端
    await loadAllData(); 
    
  } catch (err) {
    console.error(err);
    alert("❌ 更新失敗：" + err.message);
  } finally {
    if (targetBtn) {
      targetBtn.innerText = "確認儲存修改";
      targetBtn.disabled = false;
    }
  }
}

// 取得某人目前的最新狀態 (優先看暫存，再看原始資料)
function getCurrentValue(row, field) {
  const pending = changedRows.get(row);
  if (pending && pending[field] !== undefined) {
    return pending[field];
  }
  const original = fullData.find(m => m.row == row);
  return original ? original[field] : "";
}
  
  /**
 * 渲染編組介面
 */
function renderGroupInterface() {
  const pool = document.getElementById('group-pool-list');
  const display = document.getElementById('group-grid-display');
  if (!pool || !display) return; // 安全檢查

  const groupMap = {}; 
  const unassigned = [];

  // --- 💡 優化：統一分組與待分配邏輯 ---
  fullData.forEach(m => {
    // 使用我們先前討論的邏輯：優先看暫存，沒有才看原始資料
    const pending = changedRows.get(m.row);
    const currentGroupName = (pending && pending.group !== undefined) ? pending.group : m.group;

    if (currentGroupName && currentGroupName.trim() !== "") {
      if (!groupMap[currentGroupName]) groupMap[currentGroupName] = [];
      groupMap[currentGroupName].push(m);
    } else {
      // 修正點：這裡現在能正確抓到「剛被退組（暫存中）」的人了
      unassigned.push(m);
    }
  });

  // 渲染左側池
  pool.innerHTML = unassigned.map(m => `
    <div class="pool-item" onclick="clickToAssignGroup(${m.row})" 
         style="padding:10px; background:white; margin-bottom:5px; border:2px solid black; cursor:pointer;">
      <div style="font-weight:bold;">${m.name}</div>
      <div style="font-size:10px; color: #666;">${m.batch || ''}</div>
    </div>
  `).join('');

  // 排序邏輯 (保持您的邏輯：空組排前面，其餘按名稱排)
  const allGroups = Array.from(new Set([...Object.keys(groupMap), ...virtualGroups])).sort((a, b) => {
    const lenA = (groupMap[a] || []).length;
    const lenB = (groupMap[b] || []).length;
    if (lenA === 0 && lenB > 0) return -1;
    if (lenA > 0 && lenB === 0) return 1;
    return a.localeCompare(b, 'zh-Hant'); // 加入語系排序較穩定
  });

  // 渲染右側卡片
  display.innerHTML = allGroups.map((groupName, index) => {
    const ms = groupMap[groupName] || [];
    const isSelected = (activeGroup === groupName);

    return `
    <div class="item-card ${isSelected ? 'active-group' : ''}" onclick="setActiveGroup('${groupName}')">
      <div class="card-header">
        <input type="text" 
               name="groupName"
               value="${groupName}" 
               onblur="renameGroup('${groupName}', this.value)"
               onkeydown="if(event.key==='Enter') this.blur()"
               style="font-weight:900; border:none; background:transparent; width:100%; padding:0; outline:none;" 
               onclick="event.stopPropagation()">
      </div>
      <div style="flex-grow:1; min-height:50px;">
        ${ms.length > 0 ? ms.map(m => `
          <div class="member-row" style="display:flex; justify-content:space-between; align-items:center;">
            <span>• ${m.name}</span>
            <span style="color:var(--shine-red); cursor:pointer; font-weight:bold; font-size:18px; padding:0 5px;" 
                  onclick="event.stopPropagation(); removeFromGroup(${m.row})">×</span>
          </div>
        `).join('') : '<div class="empty-placeholder">(空小組 - 點擊左側加入)</div>'}
      </div>
    </div>`;
  }).join('');
}

function setActiveGroup(key) { activeGroup = key; renderGroupInterface(); document.getElementById('group-focus-info').innerText = "目標組別：" + key.split('_BK_')[0]; }

function createNewGroup() {
  // 1. 取得目前畫面上所有的小組名稱 (包含 input 內正在編輯的)
  const existingNames = Array.from(
    document.querySelectorAll('[name="groupName"]')
  ).map(i => i.value.trim());

  // 2. 自動計算下一個可用名稱 (例如：新小組1, 新小組2...)
  let i = 1;
  let newName = `新小組${i}`;
  while (existingNames.includes(newName) || virtualGroups.includes(newName)) { 
    i++; 
    newName = `新小組${i}`; 
  }

  // 3. 加入虛擬小組清單並設為目前選取
  virtualGroups.unshift(newName); // 使用 unshift 讓新組出現在最前面
  setActiveGroup(newName);

  // 4. 💡 關鍵體驗：渲染後自動聚焦到該輸入框，讓使用者可以直接改名
  setTimeout(() => {
    // 找到剛產生的那個 input (通常是第一個，因為我們用 unshift)
    const inputs = document.querySelectorAll('[name="groupName"]');
    if (inputs[0]) { 
      inputs[0].focus(); 
      inputs[0].select(); // 自動全選文字，方便使用者直接打字覆蓋
    }
  }, 100);
  
  // 5. 狀態標記
  isDirty = true;
  document.getElementById('group-save-bar')?.classList.remove('hidden');
}

function clickToAssignGroup(rowId) {
  if (!activeGroup) return alert("請先點選右側一個「小組卡片」！");

  // 1. 取得乾淨的小組名稱
  const cleanGroupName = activeGroup.split('_BK_')[0];

  // 2. 取得舊有的暫存資料 (若無則建立新物件)
  const existing = changedRows.get(rowId) || { row: rowId };

  // 3. 使用 Spread Operator 更新並寫回 Map (符合 Bug #5 的修正建議)
  // 這樣能確保 Map 偵測到物件地址的變動，且資料結構更清晰
  changedRows.set(rowId, { 
    ...existing, 
    group: cleanGroupName, 
    teamRole: "",    // 確認後端欄位名稱，通常為 teamRole
    _type: 'group'   // 標記這是小組異動，方便後端或存檔邏輯辨識
  });

  // 4. 狀態與 UI 更新
  isDirty = true;
  
  // 顯示存檔提示列
  const saveBar = document.getElementById('group-save-bar');
  if (saveBar) saveBar.classList.remove('hidden');

  console.log(`[加入小組] Row ${rowId} 已分配至 ${cleanGroupName} (暫存中)`);

  // 5. 重新渲染介面
  renderGroupInterface();
}

function removeFromGroup(rowId) {
  // 1. 取得該 row 已經存在的變動 (例如他可能剛改過寢室或是職稱)
  const existing = changedRows.get(rowId) || { row: rowId };

  // 2. 使用更新後的物件寫回 Map，確保不遺失其他欄位的暫存
  changedRows.set(rowId, { 
    ...existing,       // 保留之前的變動 (如 room)
    group: "",         // 執行退組
    teamRole: "",      // 同步清空職稱，避免殘留到下一個組別
    _type: 'group'     // 標記這是一次分組異動
  });

  // 3. 狀態與 UI 更新
  isDirty = true;
  
  const saveBar = document.getElementById('group-save-bar');
  if (saveBar) saveBar.classList.remove('hidden');

  console.log(`[移出小組] Row ${rowId} 已移回待分配名單`);

  // 4. 重新渲染
  // 因為你的 renderGroupInterface 已經修正為會檢查 changedRows，
  // 所以執行完後，這個人會立刻出現在左側名單池。
  renderGroupInterface();
}

function renameGroup(oldName, newName) {
  const trimmedNewName = newName.trim();
  if (!trimmedNewName || oldName === trimmedNewName) return;
  
  // 💡 關鍵修正：統合「虛擬組」與「資料庫現有組(含暫存)」
  const allExistingGroups = new Set([
    ...virtualGroups,
    ...fullData.map(m => {
      const p = changedRows.get(m.row);
      return (p && p.group !== undefined) ? p.group : m.group;
    }).filter(Boolean)
  ]);

  if (allExistingGroups.has(trimmedNewName) && trimmedNewName !== oldName) {
    alert(`❌ 組名「${trimmedNewName}」已存在，請使用其他名稱。`);
    renderGroupInterface();
    return;
  }

  console.log(`[重新命名] 從 ${oldName} 改為 ${trimmedNewName}`);

  let affectedCount = 0;
  fullData.forEach(m => {
    // 取得該學員目前的組名（優先看暫存，再看原始資料）
    const pending = changedRows.get(m.row);
    const currentGroupName = (pending && pending.group !== undefined) ? pending.group : m.group;

    if (currentGroupName === oldName) {
      // 關鍵優化：取得「現有的暫存資料」或「建立基礎物件」
      const existingData = changedRows.get(m.row) || { row: m.row };
      
      // 使用展開運算子合併資料，確保不洗掉已有的房號或職稱
      changedRows.set(m.row, {
        ...existingData,
        group: trimmedNewName
      });
      
      affectedCount++;
    }
  });

  // 3. 更新虛擬小組清單
  const vIdx = virtualGroups.indexOf(oldName);
  if (vIdx > -1) {
    virtualGroups[vIdx] = trimmedNewName;
  }

  // 4. 更新當前活動組名
  if (activeGroup === oldName) {
    activeGroup = trimmedNewName;
  }

  // 5. 介面與狀態更新
  // 修正點：只要有受影響人數，或是虛擬組名變了，就強制顯示儲存條
  if (affectedCount > 0 || vIdx > -1) {
    isDirty = true;
    const saveBar = document.getElementById('group-save-bar');
    if (saveBar) {
      saveBar.classList.remove('hidden');
    }
    console.log(`[成功] 已暫存 ${affectedCount} 位成員的組名變更`);
  }
  
  // 6. 重新渲染介面
  renderGroupInterface();
}
/**
 * 最終檢查與儲存
 */
function renderRoleInterface() {
  const display = document.getElementById('role-management-display');
  if (!display) return;

  const groups = {};

  // 1. 先將成員按組別分類 (💡 關鍵修正：分類時就要看暫存組別)
  fullData.forEach(m => {
    const pending = changedRows.get(m.row);
    // 取得該隊員「當前」所屬組別 (優先看暫存)
    const currentGroup = (pending && pending.group !== undefined) ? pending.group : m.group;

    if (currentGroup && currentGroup.trim() !== "") {
      if (!groups[currentGroup]) groups[currentGroup] = [];
      groups[currentGroup].push(m);
    }
  });

  // 如果暫存過後所有人都沒組別，顯示提示
  if (Object.keys(groups).length === 0) {
    display.innerHTML = `
      <div style="grid-column: 1 / -1; text-align:center; padding:50px; border:2px dashed var(--shine-black);">
        <p style="font-weight:900;">尚未有已編組成員，請先前往「編組調整」。</p>
      </div>`;
    return;
  }

  // 2. 渲染邏輯
  display.innerHTML = Object.keys(groups).sort().map(groupName => {
    const gMembers = groups[groupName];
    
    return `
      <div class="item-card">
        <div class="card-header">
          <strong style="font-size:1.2em; font-weight:900;">${groupName}</strong>
        </div>
        <div style="flex-grow:1;">
          ${gMembers.map(m => {
            // 取得該隊員「當前」職稱 (優先看暫存)
            const pending = changedRows.get(m.row);
            const currentRole = (pending && pending.teamRole !== undefined) ? pending.teamRole : m.teamRole; 

            const isChief = currentRole === '正隊輔';
            const isAssistant = currentRole === '副隊輔';
            const isStudent = !currentRole || currentRole === '';

            return `
              <div class="member-row" style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #eee;">
                <span style="font-weight:900; font-size:15px;">${m.name}</span>
                <div style="display:flex; gap:8px;">
                  <button onclick="toggleRole(${m.row}, '正隊輔')" 
                    class="role-btn ${isChief ? 'active-chief' : ''}"
                    style="cursor:pointer; border:2px solid black; padding:4px 8px; font-weight:900;
                    background: ${isChief ? '#ffcc00' : 'white'}; 
                    box-shadow: ${isChief ? 'inset 2px 2px 0px rgba(0,0,0,0.2)' : '2px 2px 0px black'};">
                    正
                  </button>
                  
                  <button onclick="toggleRole(${m.row}, '副隊輔')" 
                    class="role-btn ${isAssistant ? 'active-assistant' : ''}"
                    style="cursor:pointer; border:2px solid black; padding:4px 8px; font-weight:900;
                    background: ${isAssistant ? '#00d4ff' : 'white'}; 
                    box-shadow: ${isAssistant ? 'inset 2px 2px 0px rgba(0,0,0,0.2)' : '2px 2px 0px black'};">
                    副
                  </button>
                  
                  <button onclick="toggleRole(${m.row}, '')" 
                    class="role-btn ${isStudent ? 'active-member' : ''}"
                    style="cursor:pointer; border:2px solid black; padding:4px 8px; font-weight:900;
                    background: ${isStudent ? '#eee' : 'white'}; 
                    color: ${isStudent ? '#888' : 'black'};
                    box-shadow: ${isStudent ? 'inset 2px 2px 0px rgba(0,0,0,0.1)' : '2px 2px 0px black'};">
                    員
                  </button>
                </div>
              </div>`;
          }).join('')}
        </div>
      </div>`;
  }).join('');
}

function toggleRole(rowId, targetRole) {
  const m = fullData.find(item => item.row === rowId);
  if (!m) return;

  // 1. 取得該學員「目前最即時」的組別與職稱
  const pendingSelf = changedRows.get(rowId);
  const currentGroup = (pendingSelf && pendingSelf.group !== undefined) ? pendingSelf.group : m.group;
  const currentRole = (pendingSelf && pendingSelf.teamRole !== undefined) ? pendingSelf.teamRole : (m.teamRole || "");

  if (!currentGroup) return alert("該學員尚未分配小組，無法設定職稱。");

  let newRole = "";

  // 2. 切換邏輯
  if (currentRole === targetRole) {
    newRole = ""; // 取消身分
  } 
  else if (targetRole !== "") {
    // 💡 關鍵修正：名額檢查必須針對「目前所在小組」的所有成員
    // 找出所有「目前」在同一個小組的人（包含剛換組過來的）
    const getRealRoleCount = (roleName) => {
      return fullData.filter(member => {
        const p = changedRows.get(member.row);
        const rG = (p && p.group !== undefined) ? p.group : member.group;
        const rR = (p && p.teamRole !== undefined) ? p.teamRole : member.teamRole;
        return rG === currentGroup && rR === roleName;
      }).length;
    };

    if (targetRole === "正隊輔") {
      if (getRealRoleCount("正隊輔") >= 1) {
        alert(`⚠️ 【${currentGroup}】已經有一位正隊輔了！\n請先將原正隊輔設為學員。`);
        return;
      }
    } 
    else if (targetRole === "副隊輔") {
      if (getRealRoleCount("副隊輔") >= 2) {
        alert(`⚠️ 【${currentGroup}】副隊輔已達 2 位上限！`);
        return;
      }
    }
    newRole = targetRole;
  }

  // 3. 寫入暫存
  changedRows.set(rowId, { 
    ...(changedRows.get(rowId) || {}), 
    row: rowId, 
    group: currentGroup, // 確保暫存中記錄的是最新的組別
    teamRole: newRole,
    _type: 'role'
  });

  isDirty = true;
  document.getElementById('role-save-bar')?.classList.remove('hidden');

  renderRoleInterface(); 
}

// 建議在 HTML 調用時改為：onclick="saveBatchData(this)"
async function saveBatchData(btnElement) {
  // 💡 修正關鍵：先封裝資料，後面的邏輯才能使用 updates
  const updates = Array.from(changedRows.values());
  console.log("準備送出的更新資料:", updates);
  
  if (changedRows.size === 0) return alert("尚未偵測到變動。");

  // 1. 判定本次變動是否涉及「組別相關」
  const hasGroupChanges = updates.some(u => u._type === 'group' || u.group !== undefined);
  if (hasGroupChanges) {
    // 抓取所有小組名稱輸入框 (使用 name="groupName")
    const groupInputs = document.querySelectorAll('[name="groupName"]');
    const names = Array.from(groupInputs).map(i => i.value.trim());
    const filledNames = names.filter(n => n !== "");
    const dups = filledNames.filter((item, idx) => filledNames.indexOf(item) !== idx);

  // 2. 只有在涉及組別變動時，執行重複組名檢查
  if (dups.length > 0) {
  alert(`⚠️ 儲存攔截：偵測到重複的小組名稱：${[...new Set(dups)].join(', ')}\n\n請修正後再儲存。`);

  // 💡 修正點：使用 ID 明確控制隱藏/顯示，不依賴不存在的 Class
  ['edit', 'dorm', 'group', 'role'].forEach(t => {
    const content = document.getElementById('tab-' + t + '-content');
    const btn = document.getElementById('btn-tab-' + t);
    
    // 如果是 group 就顯示，其他就隱藏
    if (content) content.classList.toggle('hidden', t !== 'group');
    // 如果是 group 就套用啟動樣式，其他就移除
    if (btn) btn.classList.toggle('btn-next', t === 'group');
  });

  return; // 攔截，不執行後續 API 
}
  }

  // 3. 處理按鈕狀態
  // 排除使用 event.currentTarget 的不穩定性，優先使用傳入的 btnElement
  const btn = btnElement || document.getElementById('save-batch-btn') || document.getElementById('role-save-bar-btn');
  const originalText = btn ? btn.innerText : "💾 確定儲存";
  
  if (btn) {
    btn.innerText = `⏳ 同步中...`;
    btn.disabled = true;
  }

  try {
    const adminName = sessionStorage.getItem('adminName') || currentUser;
    
    // 1. 呼叫 API (後端這時會寫入資料)
    const res = await callApi("batchUpdateDormAndGroups", { 
      updates: updates, 
      adminName: sessionStorage.getItem('adminName'), // 從存儲抓
      adminPhone: sessionStorage.getItem('adminPhone') // 從存儲抓
    });

    // 💡 關鍵：不要再去判斷 if(res.success)，因為 callApi 沒報錯就代表成功
    console.log("儲存成功，後端回傳：", res);
    alert("✅ 儲存成功！");
    
    // 2. 清除變更狀態
    changedRows.clear();
    isDirty = false;
    
    // 3. 隱藏所有分頁的儲存條
    ['group-save-bar', 'dorm-save-bar', 'role-save-bar'].forEach(id => {
      const el = document.getElementById(id);
      if(el) el.classList.add('hidden');
    });

    // 4. 重新載入，確保前端資料與資料庫一致
    await loadAllData(); 

  } catch (err) {
    // 只有當網路斷線或後端真正噴錯 (throw) 時才會進到這裡
    console.error("儲存失敗的詳細診斷:", err);
    alert("❌ 儲存失敗：" + (err.message || "伺服器連線異常"));
  } finally {
    // 6. 恢復按鈕狀態
    if (btn) {
      btn.innerText = originalText;
      btn.disabled = false;
    }
  }
}

  window.addEventListener('beforeunload', (e) => {
  if (isDirty) {
    e.preventDefault();
    e.returnValue = ''; // 現代瀏覽器需要這行來觸發確認視窗
  }
});

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WE R ONE 2026 報名行政管理後台</title>
  <style>
    /* =========================================
       1. 全域變數與基礎樣式 (與 teamadmin 完全一致)
       ========================================= */
    :root {
      --shine-lime: #00ff7f;
      --shine-black: #1a1a1a;
      --shine-bg: #ffffff;
      --shine-light: #f4f7f5;
      --shine-gray: #d1d1d1;
      --shine-red: #ff4d4d;
      --shine-blue: #3498db;
      --shine-yellow: #fbc02d;
    }

    body {
      font-family: "Inter", "Noto Sans TC", sans-serif;
      background-color: #f0f0f0;
      margin: 0;
      padding: 10px;
    }

    .container {
      max-width: 1300px;
      margin: 20px auto;
      background: var(--shine-bg);
      padding: clamp(20px, 4vw, 40px);
      border: 3px solid var(--shine-black);
      box-shadow: 12px 12px 0px var(--shine-black);
      box-sizing: border-box;
      position: relative;
    }

    /* =========================================
       2. 表單與輸入元件
       ========================================= */
    .form-section {
      border: 2px solid var(--shine-black);
      padding: 20px;
      background: var(--shine-light);
      margin-bottom: 30px;
      position: relative;
    }

    .section-title {
      display: inline-block;
      background: var(--shine-black);
      color: var(--shine-lime);
      padding: 5px 20px;
      font-weight: 900;
      font-size: 1.1em;
      margin-bottom: 20px;
      margin-top: -35px;
      border: 2px solid var(--shine-black);
      box-shadow: 4px 4px 0px var(--shine-lime);
    }

    input, select, textarea {
      border: 2px solid var(--shine-black);
      padding: 12px;
      font-size: 16px;
      width: 100%;
      box-sizing: border-box;
      margin-top: 5px;
    }

    /* FIX #13: label missing display:inline-block + border */
    label {
      font-weight: 900;
      background: var(--shine-lime);
      padding: 2px 10px;
      display: inline-block;
    }


    /* =========================================
       3. 按鈕樣式 (與 teamadmin 完全一致)
       ========================================= */
    .btn {
      padding: 12px 25px;
      font-weight: 900;
      border: 2px solid var(--shine-black);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.1s ease;
      font-family: "Inter", "Noto Sans TC", sans-serif;
    }

    .btn-next {
      background: var(--shine-bg);
      color: var(--shine-black);
    }

    .btn-next:hover, .btn-next.active {
      background: var(--shine-black);
      color: var(--shine-lime);
      box-shadow: 6px 6px 0px var(--shine-black);
      transform: translate(-3px, -3px);
    }

    .btn-save-action {
      width: 100%;
      background: var(--shine-red) !important;
      color: white !important;
      border: 2px solid var(--shine-black);
      box-shadow: 6px 6px 0px var(--shine-black);
      font-size: 1.2em;
      font-weight: 900;
      padding: 15px;
      cursor: pointer;
      font-family: "Inter", "Noto Sans TC", sans-serif;
    }

    .btn-save-action:active {
      transform: translate(2px, 2px);
      box-shadow: 4px 4px 0px var(--shine-black);
    }

    /* 批次按鈕 (黃色) */
    .btn-batch {
      background: var(--shine-yellow);
      color: var(--shine-black);
      border: 2px solid var(--shine-black);
      box-shadow: 4px 4px 0px var(--shine-black);
      display: none;
      margin-bottom: 10px;
    }

    .btn-batch:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0px var(--shine-black);
    }

    /* =========================================
       4. 分頁標籤
       ========================================= */
    .tab-container {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 12px 25px;
      font-weight: 900;
      border: 2px solid var(--shine-black);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
      transition: all 0.1s ease;
      background: var(--shine-bg);
      color: var(--shine-black);
      font-family: "Inter", "Noto Sans TC", sans-serif;
    }

    .tab-btn:hover, .tab-btn.active {
      background: var(--shine-black);
      color: var(--shine-lime);
      box-shadow: 6px 6px 0px var(--shine-black);
      transform: translate(-3px, -3px);
    }

    /* =========================================
       5. 卡片元件
       ========================================= */
    .item-card {
      background: var(--shine-bg);
      border: 3px solid var(--shine-black);
      padding: 15px;
      cursor: pointer;
      transition: all 0.1s ease;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 140px;
    }

    .item-card:hover {
      transform: translate(-4px, -4px);
      box-shadow: 8px 8px 0px var(--shine-black);
    }

    .window-label {
      font-size: 12px;
      color: #333;
      background: #e0e0e0;
      padding: 2px 8px;
      border: 1px solid #999;
      margin-top: 5px;
      display: inline-block;
      font-weight: 700;
    }

    .bg-gray { background: #999 !important; color: white !important; }

    /* =========================================
       6. 財務表格
       ========================================= */
    .finance-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border: 3px solid var(--shine-black);
    }

    /* FIX #10: thead th uses class, not inline style — ensures lime color */
    .finance-table th {
      background: var(--shine-black);
      color: var(--shine-lime);
      padding: 12px;
      text-align: left;
      font-weight: 900;
    }

    .finance-table td {
      border: 1px solid var(--shine-gray);
      padding: 10px;
      font-size: 14px;
    }

    .finance-table tr:hover:not(.group-header):not(.table-summary-row) {
      background: #fffde7;
      cursor: pointer;
    }

    .group-header {
      background: #e3f2fd !important;
      font-weight: 900;
      border-bottom: 2px solid var(--shine-black) !important;
      color: var(--shine-blue);
      cursor: pointer;
      transition: background 0.2s;
    }

    .group-header:hover { background: #d1e9ff !important; }

    .toggle-icon {
      display: inline-block;
      transition: transform 0.2s;
      margin-right: 10px;
      font-weight: bold;
    }

    .header-phone {
      margin-left: 15px;
      font-size: 12px;
      font-weight: normal;
      color: #666;
    }

    .table-summary-row {
      background-color: #f8f9fa !important;
      font-weight: bold;
      border-top: 2px solid var(--shine-black);
      border-bottom: 2px solid var(--shine-black);
    }

    .balance-red { color: var(--shine-red); font-weight: 900; }
    .balance-green { color: #2e7d32; font-weight: 900; }

    .note-cell {
      font-size: 11px;
      color: #666;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* =========================================
       7. 統計表格
       ========================================= */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
      gap: 24px;
    }

    .stats-card {
      background: white;
      border: 3px solid var(--shine-black);
      padding: 18px;
      box-shadow: 6px 6px 0px var(--shine-black);
      margin-bottom: 20px;
    }

    .stats-card h3 {
      font-weight: 900;
      margin-top: 0;
      border-bottom: 3px solid var(--shine-black);
      padding-bottom: 8px;
    }

    .stats-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 10px; }
    .stats-table th, .stats-table td { border: 1px solid #ddd; padding: 10px 8px; text-align: center; }
    .stats-table th { background-color: var(--shine-black); color: var(--shine-lime); font-weight: 900; }
    .total-cell { background-color: #fff9c4 !important; font-weight: bold; }
    .row-label { text-align: left !important; background: #fdfdfd; font-weight: bold; }

    /* 摘要數據塊樣式 (平時顯示) */
    .summary-container {display: grid;grid-template-columns: repeat(3, 1fr);gap: 20px;margin-bottom: 24px;}
    .summary-box {background: white;border: 3px solid var(--shine-black);padding: 15px;text-align: center;box-shadow: 4px 4px 0px var(--shine-black);}
    .summary-box .num { font-size: 24px; font-weight: 900; display: block; }
    .summary-box .label { font-size: 14px; color: #666; }

    /* 預設隱藏列印元件 */
    .print-header, .print-title { display: none !important; }

    /* 列印專用樣式 */
    @media print {
      @page {size: A4 portrait;margin: 1cm;}
      html, body {background: white !important;background-color: white !important;}
    body * { visibility: hidden; }
    #stats-container, #stats-container * { visibility: visible; }
    #stats-container { position: absolute; left: 0; top: 0; width: 100%;background: white; }
    /* 2. 第一頁：設定為兩欄佈局 (1fr 1fr) */
    #page-1-content {display: grid !important;grid-template-columns: 1fr 1fr !important; gap: 10px !important;}

    /* 3. 第二頁 (教會)：設定為單欄滿版 */
    #page-2-content {display: block !important; /* 或是 grid-template-columns: 1fr */
    width: 100%;
    }
  
    /* 確保表格總計 (tfoot) 邏輯 */
    table { page-break-inside: auto; }
    tr { page-break-inside: avoid; page-break-after: auto; }
    tfoot { display: table-row-group; } 

    .no-print { display: none !important; }
    .stats-card {box-shadow: none !important;border: 1px solid #000 !important;margin-bottom: 15px !important;page-break-inside: avoid; /* 防止卡片被切斷 */}
    .stats-card h3 {
    font-size: 14px !important; /* 縮小標題字體 */
    margin: 0 0 8px 0 !important; /* 移除頂部邊距，縮小底部邊距 */
    padding-bottom: 4px !important;
    border-bottom: 2px solid #000 !important;
    text-align: left;
    }
    .stats-table {font-size: 12px !important; /* 稍微縮小字體 */line-height: 1.6 !important; /* 緊縮行高 */}
    .stats-table th, .stats-table td {padding: 4px 2px !important; /* 大幅縮小單元格的上下內邊距 (原本可能是 10px) */
                                      border: 1px solid #000 !important;}

    .summary-container {gap: 10px !important;margin-bottom: 15px !important;}
    .summary-box {padding: 8px !important;}
    .summary-box .num { font-size: 20px !important; }
    
    /* 強制分頁邏輯 */
    .page-break { display: block;page-break-after: always; }
  
    /* 顯示列印專用標頭與標題 */
    .print-header { display: block !important; text-align: right; font-size: 10px; border-bottom: 1px solid #000; }
    .print-title { display: block !important; text-align: center; font-size: 20px; font-weight: bold; margin: 10px 0; }
    }
    
    /* =========================================
       8. 徽章與標籤
       ========================================= */
    .badge {
      padding: 4px 8px;
      font-weight: 900;
      font-size: 12px;
      border: 1px solid var(--shine-black);
    }

    .bg-red { background: var(--shine-red); color: white; }
    .bg-green { background: var(--shine-lime); color: var(--shine-black); }
    .bg-yellow { background: var(--shine-yellow); color: var(--shine-black); }

    /* =========================================
       9. 搜尋列 / 批次狀態
       FIX #7: replaced undefined .control-panel/.search-group with proper styles
       ========================================= */
    #search-section {
      margin-bottom: 20px;
    }

    .search-group {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 15px;
      align-items: end;
    }

    /* Finance search has 3 cols: input | select | count */
    .search-group.finance-search-layout {
      grid-template-columns: 1fr auto auto auto;
    }

    .search-group input, .search-group select {
      margin-top: 0;
    }

    .count-badge {
      padding: 12px 15px;
      font-weight: 900;
      border: 2px solid var(--shine-black);
      background: white;
      text-align: center;
      box-shadow: 4px 4px 0px var(--shine-black);
      white-space: nowrap;
    }

    /* FIX #15: batch-status-bar restored */
    #batch-status-bar {
      background: var(--shine-lime);
      border: 2px solid var(--shine-black);
      padding: 8px 15px;
      font-weight: 900;
      margin-top: 10px;
    }

    #batch-summary-info {
      background: #fff9c4;
      padding: 15px;
      border: 3px dashed var(--shine-black);
      margin-bottom: 20px;
      font-weight: 900;
    }

    /* =========================================
       10. 清單佈局
       ========================================= */
    #section-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      width: 100%;
    }

    #section-list.finance-mode { display: block !important; }

    /* =========================================
       11. 彈窗 (editModal)
       ========================================= */
    #editModal {
      padding: 40px 10px !important;
    }

    #editModal > .container {
      max-width: 900px !important;
      border: 4px solid var(--shine-black) !important;
      background: var(--shine-bg) !important;
      box-shadow: 20px 20px 0px var(--shine-black) !important;
      padding: 30px !important;
    }

    #editModal h2 {
      margin-bottom: 40px;
      font-size: 1.8em;
      border-bottom: 4px double var(--shine-black);
      padding-bottom: 10px;
    }

    #editModal .grid-row {
      display: grid !important;
      grid-template-columns: repeat(2, 1fr) !important;
      gap: 15px 25px !important;
    }

    #editModal .form-group[style*="grid-column: 1 / -1"] {
      grid-column: span 2 !important;
    }

    #editModal .form-section {
      margin-bottom: 40px !important;
      position: relative;
    }

    #editModal .v-req:focus {
      border-color: var(--shine-lime);
      outline: none;
      box-shadow: 4px 4px 0px var(--shine-black);
    }

    .finance-section-title {
      background: var(--shine-blue) !important;
      color: white !important;
      box-shadow: 4px 4px 0px var(--shine-blue) !important;
    }

    .note-section { background: #fff9c4 !important; border: 3px solid var(--shine-yellow) !important; }
    .note-section-title { background: var(--shine-yellow) !important; color: var(--shine-black) !important; box-shadow: 4px 4px 0px var(--shine-yellow) !important; }

    /* =========================================
       12. 載入遮罩
       ========================================= */
    .loading-mask {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.85);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1.2em;
    }

    .loading-mask::before {
      content: "⏳";
      margin-right: 10px;
      font-size: 1.5em;
    }

    /* =========================================
       13. 動畫
       ========================================= */
    .tab-content { animation: fadeIn 0.3s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* =========================================
       14. 響應式
       ========================================= */
    @media (max-width: 700px) {
      #editModal .grid-row { grid-template-columns: 1fr !important; }
      #editModal .form-group[style*="grid-column: 1 / -1"] { grid-column: span 1 !important; }
      .stats-grid { grid-template-columns: 1fr; }
      .search-group, .search-group.finance-search-layout { grid-template-columns: 1fr; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="loading" class="loading-mask hidden">處理中 (PROCESSING)...</div>

  <!-- ==================== 登入區塊 ==================== -->
  <div id="auth-block" class="container" style="max-width: 500px; margin-top: 80px;">
    <div class="section-title">行政管理後台驗證</div>
    <div class="form-section">
      <!-- FIX #14: removed redundant inline padding from password form-group -->
      <div class="form-group">
        <label for="u_name">帳號</label>
        <input type="text" id="u_name" placeholder="請輸入帳號">
      </div>
      <div class="form-group" style="padding:10px 0 0;">
        <label for="u_pass">密碼</label>
        <input type="password" id="u_pass" placeholder="請輸入密碼">
      </div>
      <button class="btn btn-next" style="width:100%; margin-top:10px;" onclick="doLogin()">登入驗證</button>
    </div>
  </div>

  <!-- ==================== 主後台介面 ==================== -->
  <div id="admin-dashboard" class="container hidden">
    <div class="section-title" id="dashboard-title">營會行政後台</div>

    <!-- 分頁切換 -->
    <div class="tab-container">
      <button class="tab-btn active" id="tab-edit" onclick="switchMainTab('edit')">資料編修</button>
      <button class="tab-btn" id="tab-finance" onclick="switchMainTab('finance')">繳費登記</button>
      <button class="tab-btn" id="tab-stats" onclick="switchMainTab('stats')">報名現況</button>
    </div>

    <!-- FIX #7: search section now uses form-section wrapper + proper .search-group CSS -->
    <div id="search-section" class="form-section">
      <div class="section-title">快速檢索</div>

      <!-- 資料編修搜尋列 -->
      <div id="admin-search-group" class="search-group">
        <div>
          <label for="admin-search" style="margin:0 0 5px;">關鍵字搜尋</label>
          <input type="text" id="admin-search" placeholder="搜尋姓名、電話、教會、窗口..." oninput="handleAdminSearch()">
        </div>
        <span id="admin-stats-count" class="count-badge">0 筆</span>
      </div>

      <!-- 繳費登記搜尋列 (預設隱藏) -->
      <div id="finance-search-group" class="search-group finance-search-layout hidden">
        <div>
          <label for="finance-search" style="margin:0 0 5px;">關鍵字搜尋</label>
          <input type="text" id="finance-search" placeholder="搜尋姓名、電話、教會、窗口..." oninput="handleFinanceSearch()">
        </div>
        <div>
          <label for="window-filter-select" style="margin:0 0 5px;">篩選窗口</label>
          <select id="window-filter-select" onchange="handleFinanceSearch()">
            <option value="all">📁 所有窗口</option>
          </select>
        </div>
        <div>
          <label for="status-filter-select" style="margin:0 0 5px;">報名狀態</label>
          <select id="status-filter-select" onchange="handleFinanceSearch()">
            <option value="all">📌 所有狀態</option>
            <option value="已繳費">✅ 已繳費 (已繳清)</option>
            <option value="待繳費" selected>⏳ 待繳費 (尚有餘額)</option>
            <option value="取消報名">❌ 取消報名</option>
          </select>
        </div>
        <span id="finance-stats-count" class="count-badge">0 筆</span>
      </div>

      <!-- FIX #15: batch-status-bar restored inside search section -->
      <div id="batch-status-bar" class="hidden">
        已選取 <span id="batch-count" style="color:var(--shine-red)">0</span> 筆資料
      </div>
    </div>

    <!-- 批次按鈕 -->
    <button id="btn-batch-edit" class="btn btn-batch" onclick="openBatchEdit()">
      ⚡ 批次登記選中項目 (<span id="selected-count">0</span>)
    </button>

    <!-- 卡片 / 財務清單 -->
    <div id="section-list" class="tab-content"></div>

    <!-- 統計分頁 -->
    <div id="section-stats" class="hidden tab-content">
      <div style="text-align: right; margin-bottom: 15px;" class="no-print">
        <button class="btn" style="background:#666; color:white; margin-right:8px;" onclick="printStats()">🖨️ 列印 A4 報表</button>
        <button class="btn btn-next" onclick="refreshStats()">🔄 刷新數據</button>
      </div>
      <div id="stats-container">
        <div class="stats-card">正在彙整報名數據...</div>
      </div>
    </div>
    

  <!-- ==================== 編輯彈窗 ==================== -->
  <div id="editModal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; overflow-y:auto;">
    <div class="container" style="max-width:900px; margin:auto; position:relative;">
      <button onclick="closeModal()" style="position:absolute; right:20px; top:20px; background:var(--shine-red); color:white; border:2px solid var(--shine-black); padding:5px 15px; cursor:pointer;">關閉 X</button>
      <h2 style="text-align:center; font-weight:900;">修改成員資料</h2>
      <input type="hidden" id="edit-row-index">

      <div id="modal-fields-container">
        <div id="batch-summary-info" class="hidden"></div>

        <!-- 個人資料 -->
        <div class="form-section">
          <div class="section-title">個人資料</div>
          <div class="grid-row">
            <div class="form-group"><label>姓名</label><input type="text" id="m-name" class="v-req"></div>
            <div class="form-group"><label>性別</label><select id="m-gender" class="v-req"><option>男</option><option>女</option></select></div>
            <div class="form-group"><label>生日</label><input type="date" id="m-birthday" class="v-req"></div>
            <div class="form-group"><label>手機</label><input type="tel" id="m-phone" class="v-req" oninput="formatPhone(this)"></div>
            <div class="form-group"><label>電子郵件</label><input type="email" id="m-email" class="v-req"></div>
          </div>
        </div>

        <!-- 參與身分 -->
        <div class="form-section">
          <div class="section-title">參與身分</div>
          <div class="grid-row">
            <div class="form-group"><label>報名身分</label><select id="m-role" class="v-req"><option>國中</option><option>高中職</option><option>大專</option><option>社青</option><option>傳道</option><option>牧師</option></select></div>
            <div class="form-group"><label>就讀學校</label><input type="text" id="m-school" class="v-req"></div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz3gO1h1F8h1EQ_eiMQm8pMv5pMAWVPkT2BAc-cz46vy-1PTMJICaSR6aronxjI_8Tu/exec";

    let fullData = [];
    let currentTab = 'edit';
    let searchTimer;
    let isModalDirty = false;
    let batchSelectedRows = [];
    let currentDisplayData = [];
    let currentFilteredData = []; // unified filtered result shared by search + pagination
    let currentPage = 1;
    const pageSize = 20;
    let originalData = {};

    // =========================================
    // API 核心
    // =========================================
    async function api(payload) {
      document.getElementById('loading').classList.remove('hidden');
      try {
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
        return await res.json();
      } catch(e) {
        alert("連線超時或錯誤，請檢查後端部署版本");
      } finally {
        document.getElementById('loading').classList.add('hidden');
      }
    }

    // =========================================
    // 登入
    // =========================================
    // 1. 頁面載入時自動執行的初始化檢查
window.addEventListener('load', async () => {
  const savedToken = sessionStorage.getItem('admin_token');
  const savedName = sessionStorage.getItem('admin_name');

  if (savedToken && savedName) {
    // 如果有 Token，直接跳過登入步驟進入儀表板
    showDashboard(savedName);
    fetchData();
    attachModalListener();
  }
});

// 2. 將原本 doLogin 裡面切換 UI 的邏輯抽出來共用
function showDashboard(userName) {
  document.getElementById('auth-block').classList.add('hidden');
  document.getElementById('admin-dashboard').classList.remove('hidden');
  document.getElementById('dashboard-title').innerText = `管理人員：${userName}`;
}

// 3. 修改後的 doLogin
async function doLogin() {
  const u = document.getElementById('u_name').value;
  const p = document.getElementById('u_pass').value;
  if (!u || !p) { alert("請填寫帳號與密碼"); return; }
  
  const res = await api({ action: 'login', username: u, password: p });
  
  if (res && res.success) {
    sessionStorage.setItem('admin_token', res.token);
    sessionStorage.setItem('admin_name', res.userName);
    showDashboard(res.userName); // 使用共用函式
    fetchData();
    attachModalListener();
  } else {
    alert("❌ 驗證失敗，請確認帳號密碼");
  }
}


    // =========================================
    // 資料載入
    // =========================================
    async function fetchData() {
      const res = await api({
        action: 'fetchAllData',
        token: sessionStorage.getItem('admin_token')
      });
      if (res && res.success) {
        fullData = res.data;
        // FIX #11: always build window options regardless of current tab
        updateWindowFilterOptions();
        refreshCurrentView();
      }
    }

    // 根據當前分頁刷新畫面，保留使用者搜尋關鍵字
    function refreshCurrentView() {
      if (currentTab === 'finance') {
        handleFinanceSearch();
      } else if (currentTab === 'edit') {
        handleAdminSearch();
      } else if (currentTab === 'stats') {
        refreshStats();
      }
    }

    // =========================================
    // 分頁切換
    // FIX #4: switched to refreshCurrentView() instead of direct render with empty data
    // FIX #5: use classList only, no inline style fighting
    // =========================================
    function switchMainTab(tab) {
      currentTab = tab;
      currentPage = 1; // reset pagination on tab switch

      // Update button UI
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      const activeBtn = document.getElementById('tab-' + tab);
      if (activeBtn) activeBtn.classList.add('active');

      const isStats = (tab === 'stats');
      const isFinance = (tab === 'finance');

      const searchSection  = document.getElementById('search-section');
      const listSection    = document.getElementById('section-list');
      const statsSection   = document.getElementById('section-stats');
      const adminSearchGrp = document.getElementById('admin-search-group');
      const finSearchGrp   = document.getElementById('finance-search-group');

      if (isStats) {
        // Stats mode: hide search + list, show stats
        if (searchSection) searchSection.classList.add('hidden');
        if (listSection) {
          listSection.classList.add('hidden');
          listSection.innerHTML = ""; // clear stale finance table / cards
          listSection.classList.remove('finance-mode'); // reset layout mode
        }
        if (statsSection)  statsSection.classList.remove('hidden');
        refreshStats();
      } else {
        // List mode (edit or finance)
        if (statsSection)  statsSection.classList.add('hidden');
        if (searchSection) searchSection.classList.remove('hidden');
        if (listSection)   listSection.classList.remove('hidden');

        // Toggle the right search group
        if (isFinance) {
          if (adminSearchGrp) adminSearchGrp.classList.add('hidden');
          if (finSearchGrp)   finSearchGrp.classList.remove('hidden');
        } else {
          if (finSearchGrp)   finSearchGrp.classList.add('hidden');
          if (adminSearchGrp) adminSearchGrp.classList.remove('hidden');
        }

        // Refresh with current keywords preserved
        refreshCurrentView();
      }

      updateBatchUI();
    }

    // =========================================
    // 搜尋處理 — 行政編修模式
    // =========================================
    function handleAdminSearch() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        const key = (document.getElementById('admin-search')?.value || '').toLowerCase().trim();
        currentPage = 1;

        currentFilteredData = fullData.filter(m => {
          if (!key) return true;
          return (m.name        && m.name.toLowerCase().includes(key))   ||
                 (m.phone       && m.phone.includes(key))                 ||
                 (m.church      && m.church.toLowerCase().includes(key))  ||
                 (m.contactName && m.contactName.toLowerCase().includes(key));
        });

        const statsEl = document.getElementById('admin-stats-count');
        if (statsEl) statsEl.innerText = `共 ${currentFilteredData.length} 筆`;

        renderAdminModule(currentFilteredData);
      }, 250);
    }

    // =========================================
    // 搜尋處理 — 財務模式
    // =========================================
    function handleFinanceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    const key            = (document.getElementById('finance-search')?.value || '').toLowerCase().trim();
    const selectedWindow = document.getElementById('window-filter-select')?.value || 'all';
    // 獲取 UI 上的狀態篩選值
    const selectedStatus = document.getElementById('status-filter-select')?.value || 'all';

    currentFilteredData = fullData.filter(m => {
      // 1. 關鍵字篩選 (保持原樣)
      const matchKey = !key ||
        (m.name          && m.name.toLowerCase().includes(key))   ||
        (m.phone         && m.phone.includes(key))                  ||
        (m.church        && m.church.toLowerCase().includes(key))   ||
        (m.contactName   && m.contactName.toLowerCase().includes(key));

      // 2. 窗口篩選 (保持原樣)
      const mWindow  = (m.contactName || "").trim() || "個人報名";
      const matchWin = (selectedWindow === 'all') || (mWindow === selectedWindow);

      // 3. 狀態篩選 (同步卡片渲染邏輯)
      const balance    = Number(m.totalDue || 0) - Number(m.paid || 0) - Number(m.subsidy || 0);
      const isCancelled = (m.status === '取消報名');
      const isComplete  = (balance <= 0);

      // 判斷該資料屬於哪一個分類
      let currentStatusCategory = "";
      if (isCancelled) {
        currentStatusCategory = "取消報名";
      } else if (isComplete) {
        currentStatusCategory = "已繳費";
      } else {
        currentStatusCategory = "待繳費";
      }

      const matchStat = (selectedStatus === 'all') || (currentStatusCategory === selectedStatus);

      return matchKey && matchWin && matchStat;
    });

    const statsEl = document.getElementById('finance-stats-count');
    if (statsEl) statsEl.innerText = `顯示 ${currentFilteredData.length} 筆`;

    renderFinanceModule(currentFilteredData);
  }, 250);
}

    // FIX #11: always called unconditionally in fetchData()
    function updateWindowFilterOptions() {
      const select = document.getElementById('window-filter-select');
      if (!select) return;

      const windows = [...new Set(
        fullData.map(m => (m.contactName || "").trim() || "個人報名")
      )].sort();

      let optionsHtml = '<option value="all">📁 所有窗口</option>';
      windows.forEach(w => {
        const info        = fullData.find(m => ((m.contactName || "").trim() || "個人報名") === w);
        const phoneSuffix = (w !== "個人報名" && info?.contactPhone) ? ` (${info.contactPhone})` : "";
        optionsHtml += `<option value="${w}">${w}${phoneSuffix}</option>`;
      });
      select.innerHTML = optionsHtml;
    }

    // =========================================
    // 排序
    // =========================================
    function sortData(data) {
      return [...data].sort((a, b) => {
        const winA = (a.contactName || "").trim();
        const winB = (b.contactName || "").trim();
        if (!winA && winB)  return -1;
        if (!winB && winA)  return 1;
        if (winA !== winB)  return winA.localeCompare(winB);
        const churchA = (a.church || "").trim();
        const churchB = (b.church || "").trim();
        if (churchA !== churchB) return churchA.localeCompare(churchB);
        return a.name.localeCompare(b.name);
      });
    }

    // =========================================
    // 渲染 — 行政卡片模式
    // =========================================
    function renderAdminModule(data) {
      const container = document.getElementById('section-list');
      if (!container) return;

      container.classList.remove('finance-mode');
      const sorted = sortData(data);
      currentDisplayData = sorted;

      if (sorted.length === 0) {
        container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; border:2px dashed var(--shine-gray); color:var(--shine-gray); font-weight:900;">📭 無符合條件的資料</div>`;
        return;
      }

      // Pagination
      const totalPages = Math.ceil(sorted.length / pageSize);
      if (currentPage > totalPages) currentPage = 1;
      const start    = (currentPage - 1) * pageSize;
      const pagedData = sorted.slice(start, start + pageSize);

      const cardsHtml = pagedData.map(m => {
        const balance      = Number(m.totalDue || 0) - Number(m.paid || 0) - Number(m.subsidy || 0);
        const isCancelled  = (m.status === '取消報名');
        const isComplete   = (balance <= 0);
        const statusClass  = isCancelled ? 'bg-gray' : (isComplete ? 'bg-green' : 'bg-red');
        const statusText   = isCancelled ? '已取消'  : (isComplete ? '已繳清'  : `待繳 $${balance}`);
        const cardStyle    = isCancelled
          ? 'opacity:0.6; background:#f5f5f5;'
          : '';

        return `
          <div class="item-card" onclick="openAction(${m.row})" style="${cardStyle}">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
              <strong style="font-size:1.15em; ${isCancelled ? 'text-decoration:line-through; color:#888;' : ''}">
                ${m.name}
              </strong>
              <span class="badge ${statusClass}" style="font-size:11px; padding:2px 8px;">${statusText}</span>
            </div>
            <div style="flex-grow:1; border-top:1px solid #eee; padding-top:10px; font-size:14px; color:#555;">
              <div style="font-weight:900; color:${isCancelled ? '#999' : 'var(--shine-black)'}; margin-bottom:4px;">⛪ ${m.church || '未填教會'}</div>
              <div style="color:#666; font-size:13px;">📱 ${m.phone || '無電話紀錄'}</div>
            </div>
            <div style="margin-top:12px; border-top:1px dashed var(--shine-gray); padding-top:8px;">
              <div class="window-label" style="display:block; text-align:center; background:${isCancelled ? '#eee' : '#f9f9f9'}; color:#777;">
                👤 窗口：${m.contactName || '個人'}
              </div>
            </div>
          </div>`;
      }).join('');

      const paginationHtml = `
        <div style="grid-column:1/-1; display:flex; justify-content:center; align-items:center; gap:20px; margin-top:30px; padding:20px;">
          <button class="btn btn-next" onclick="changePage(-1)" ${currentPage === 1 ? 'disabled style="opacity:0.5;cursor:not-allowed;"' : ''}>上一頁</button>
          <span style="font-weight:900;">第 ${currentPage} / ${totalPages} 頁（共 ${sorted.length} 筆）</span>
          <button class="btn btn-next" onclick="changePage(1)" ${currentPage === totalPages ? 'disabled style="opacity:0.5;cursor:not-allowed;"' : ''}>下一頁</button>
        </div>`;

      container.innerHTML = cardsHtml + paginationHtml;
    }

    // =========================================
    // 渲染 — 財務表格模式
    // FIX #10: removed inline style from thead tr, letting .finance-table th handle lime color
    // =========================================
    function renderFinanceModule(data) {
  const container = document.getElementById('section-list');
      if (!container) return;

      container.classList.add('finance-mode');
      const sorted = sortData(data);
      currentDisplayData = sorted;

      container.innerHTML = `
        <div style="width:100%; overflow-x:auto;">
          <table class="finance-table">
            <thead>
              <tr>
                <th style="width:40px;">選</th>
                <th>姓名</th><th>教會</th><th>狀態</th>
                <th style="text-align:right;">應繳</th>
                <th style="text-align:right;">補助</th>
                <th style="text-align:right;">已繳</th>
                <th style="text-align:right;">餘額</th>
                <th>財務備註</th>
              </tr>
            </thead>
            <tbody id="finance-body"></tbody>
          </table>
        </div>`;

  const tbody = document.getElementById('finance-body');
  let lastWindow = null, gDue = 0, gPaid = 0, gSub = 0, groupIndex = 0;
  let groupMemberCount = 0; // 新增：用來記錄當前群組的序號
  let rowsHtml = "";

  sorted.forEach((m, index) => {
    const currentWindow = (m.contactName || "").trim();
    const balance       = Number(m.totalDue || 0) - Number(m.paid || 0) - Number(m.subsidy || 0);
    const isComplete    = (balance <= 0);
    const isCancelled = (m.status === '取消報名');

    // 換窗口時：重置小計與序號
    if (lastWindow !== null && currentWindow !== lastWindow && lastWindow !== "") {
      rowsHtml += renderGroupSummaryHtml(lastWindow, gDue, gPaid, gSub, groupIndex);
      gDue = 0; gPaid = 0; gSub = 0; 
      groupIndex++;
      groupMemberCount = 0; // 換新群組，序號重置
    }

    // 渲染群組標頭 (Group Header)
    if (currentWindow !== lastWindow) {
      const isIndiv = currentWindow === "";
      rowsHtml += `
        <tr class="group-header" ${isIndiv ? '' : `onclick="toggleGroup(${groupIndex}, this)"`}>
          <td colspan="9">
            ${isIndiv ? '📍' : '<span class="toggle-icon">▼</span>'}
            <strong>${isIndiv ? "個人報名區域" : "窗口：" + currentWindow}</strong>
            ${(!isIndiv && m.contactPhone) ? `<span class="header-phone">📱 ${m.contactPhone}</span>` : ''}
          </td>
        </tr>`;
      lastWindow = currentWindow;
      groupMemberCount = 0; // 確保 header 之後的第一筆從 1 開始（針對個人報名區）
    }

    // 累加序號
    groupMemberCount++;

    if (currentWindow !== "") {
      gDue  += Number(m.totalDue || 0);
      gPaid += Number(m.paid || 0);
      gSub  += Number(m.subsidy || 0);
    }

    const rowClass = currentWindow === "" ? "" : `group-row-${groupIndex}`;
    
    // 修改處：在姓名欄位前面加上序號
    rowsHtml += `
      <tr onclick="openAction(${m.row})" class="${rowClass}">
        <td onclick="event.stopPropagation()">
          <input type="checkbox" class="row-checkbox" value="${m.row}" onchange="updateBatchUI()">
        </td>
        <td>
          <span style="display: inline-block; width: 20px; color: #888; font-size: 0.85em;text-align: right;margin-right: 3px;">${groupMemberCount}.</span>
          <strong>${m.name}</strong>
        </td>
        <td>${m.church || ''}</td>
        <td><span class="badge ${isCancelled ? 'bg-gray' : (isComplete ? 'bg-green' : 'bg-red')}">${isCancelled ? '取消' : (isComplete ? '完成' : '待繳')}</span></td>
        <td style="text-align:right;">${m.totalDue || 0}</td>
        <td style="text-align:right;">${m.subsidy || 0}</td>
        <td style="text-align:right; color:var(--shine-blue);">${m.paid || 0}</td>
        <td style="text-align:right;" class="${balance > 0 ? 'balance-red' : 'balance-green'}">${balance}</td>
        <td class="note-cell">${m.payNote || ''}</td>
      </tr>`;

    // Last row subtotal
        if (index === sorted.length - 1 && currentWindow !== "") {
          rowsHtml += renderGroupSummaryHtml(currentWindow, gDue, gPaid, gSub, groupIndex);
        }
  });

  tbody.innerHTML = rowsHtml;
}



    // FIX #3: changePage now routes correctly to the right renderer
    function changePage(delta) {
      currentPage += delta;
      if (currentTab === 'finance') {
        renderFinanceModule(currentFilteredData);
      } else {
        renderAdminModule(currentFilteredData);
      }
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // =========================================
    // 小計列 HTML
    // =========================================
    function renderGroupSummaryHtml(name, due, paid, sub, idx) {
      const bal = due - paid - sub;
      return `
        <tr class="table-summary-row group-row-${idx}">
          <td colspan="3" style="text-align:right; font-weight:900;">📊 [${name}] 窗口小計：</td>
          <td>-</td>
          <td style="text-align:right;">$${due}</td>

    // =========================================
    async function submitEdit() {
      const rowId = document.getElementById('edit-row-index').value;

      // BATCH mode
      if (rowId === "BATCH") {
        await submitBatchEdit();

    // =========================================
    // 批次儲存
    // FIX #2: dedicated batch handler
    // =========================================
    async function submitBatchEdit() {
      const inputPaid = document.getElementById('m-paid').value;
      if (!inputPaid || Number(inputPaid) <= 0) {
        alert("❌ 批次模式下必須填寫「已繳金額」（大於 0）。");
        return;
      }
      if (!confirm(`確定要將這 ${batchSelectedRows.length} 位成員，每位都登記已繳 $${inputPaid} 元嗎？`)) return;

      const adminName = sessionStorage.getItem('admin_name') || "管理員";
      const now       = new Date().toLocaleString('zh-TW', { hour12: false });
      const payNote   = document.getElementById('m-payNote').value;
      const receiver  = document.getElementById('m-receiver').value;
      const subsidy   = Number(document.getElementById('m-subsidy').value || 0);
      const payMethod = document.getElementById('m-payMethod').value;

      const updates = batchSelectedRows.map(id => {
        const m = fullData.find(x => String(x.row) === id);
        const financeTrace = `[${now} ${adminName} 批次更新：已繳=$${inputPaid}] `;
        return {
          row: id,
          data: {
            paid:      Number(inputPaid),
            subsidy:   subsidy,
            payMethod: payMethod,
            payNote:   financeTrace + payNote,
            receiver:  receiver,
          }
        };
      });

      const res = await api({
        action:    'batchUpdate',
        token:     sessionStorage.getItem('admin_token'),
        updates:   updates,
        adminName: adminName
      });

      if (res && res.success) {
        alert("✅ 批次更新成功！");
        closeModal();
        fetchData();
      } else {
        alert("❌ 批次更新失敗：" + (res?.message || "未知錯誤"));
      }
    }

    // =========================================
    // 行政資料儲存
    // FIX #8: status comparison handles legacy "尚未繳費"
    // FIX #12: better hint when no admin fields changed
    // =========================================
    async function submitAdminEdit() {
      const rowId     = document.getElementById('edit-row-index').value;
      const adminName = sessionStorage.getItem('admin_name') || "管理員";
      const now       = new Date().toLocaleString('zh-TW', { hour12: false });

      const trackedAdminFields = ['name','gender','birthday','phone','email','role','school',
                                   'grade','church','isChristian','isBaptized','iceName','iceRel',
                                   'icePhone','isAttended','dietary','medical','status'];

      // Seed updateData with whitelisted fields from originalData only.
      // Avoids sending internal fields (batch, group, room, etc.) that may cause backend errors.
      const _adminWhitelist = ['name', 'gender', 'birthday', 'phone', 'email', 'role', 'school', 'grade', 'church', 'isChristian', 'isBaptized', 'iceName', 'iceRel', 'icePhone', 'isAttended', 'dietary', 'medical', 'status', 'totalDue', 'paid', 'subsidy', 'payMethod', 'receiver', 'payNote', 'adminNote'];
      const updateData = {};
      _adminWhitelist.forEach(k => { if (originalData[k] !== undefined) updateData[k] = originalData[k]; });
      let adminChangeLogs = [];

      trackedAdminFields.forEach(f => {
        const el = document.getElementById('m-' + f);
        if (!el) return;

        let newVal     = el.value || "";
        let oldVal     = (originalData[f] == null) ? "" : String(originalData[f]).trim();
        let compareNew = String(newVal).trim();

        // BUG2 FIX: normalize birthday to ISO yyyy-mm-dd before comparing
        // DB may store as yyyy/mm/dd or other locale formats causing false positives
        if (f === 'birthday' && oldVal) {
          try {
            const d = new Date(oldVal);
            if (!isNaN(d.getTime())) oldVal = d.toISOString().split('T')[0];
          } catch(dateErr) {}
        }

        // FIX #8: status comparison handles legacy "尚未繳費" values in DB
        if (f === 'status') {
          const isOldNormal = (oldVal === "" || oldVal === "正常報名" || oldVal === "尚未繳費");
          const isNewNormal = (compareNew === "");
          if (isOldNormal && isNewNormal) return;
        }

        if (compareNew !== oldVal) {
          updateData[f] = newVal;
          const label = el.closest('.form-group')?.querySelector('label')?.innerText || f;
          adminChangeLogs.push(`${label}: [${oldVal || '無'}] ➡️ [${compareNew || '無'}]`);
        }
      });

      const userAdminReason = document.getElementById('m-adminNote').value.trim();

      if (adminChangeLogs.length > 0) {
        if (!userAdminReason) {
          alert("⚠️ 偵測到行政個資異動，請填寫「本次異動說明」。");
          document.getElementById('m-adminNote').focus();
          return;
        }
        const adminTrace = `--- 📅 ${now} (${adminName}) ---\n🔍 變動：${adminChangeLogs.join(', ')}\n📝 原因：${userAdminReason}\n\n`;
        updateData['adminNote'] = adminTrace + (originalData.adminNote || "");
      } else {
        // No admin fields changed — preserve existing adminNote and proceed to save
        updateData['adminNote'] = originalData.adminNote || "";
      }


      await callUpdateAPI(rowId, updateData, adminName);
    }

    // =========================================
    // 財務資料儲存
    // =========================================
    async function submitFinanceEdit() {
      const rowId     = document.getElementById('edit-row-index').value;
      const adminName = sessionStorage.getItem('admin_name') || "管理員";
      const now       = new Date().toLocaleString('zh-TW', { hour12: false });

      const trackedFinanceFields = ['paid','subsidy','totalDue','payMethod','receiver'];

      // Seed updateData with whitelisted fields from originalData only.
      const _financeWhitelist = ['name', 'gender', 'birthday', 'phone', 'email', 'role', 'school', 'grade', 'church', 'isChristian', 'isBaptized', 'iceName', 'iceRel', 'icePhone', 'isAttended', 'dietary', 'medical', 'status', 'totalDue', 'paid', 'subsidy', 'payMethod', 'receiver', 'payNote', 'adminNote'];
      const updateData = {};
      _financeWhitelist.forEach(k => { if (originalData[k] !== undefined) updateData[k] = originalData[k]; });
      let financeChangeLogs = [];

      trackedFinanceFields.forEach(f => {
        const el = document.getElementById('m-' + f);
        if (!el) return;

        let newVal     = el.value || "";
        let oldVal     = (originalData[f] == null) ? "" : String(originalData[f]).trim();
        let compareNew = String(newVal).trim();

        // Numeric equality check
        if (['totalDue','subsidy','paid'].includes(f)) {
          if (Number(oldVal || 0) === Number(compareNew || 0)) return;
        }

        if (compareNew !== oldVal) {
          updateData[f] = newVal;
          const label = el.closest('.form-group')?.querySelector('label')?.innerText || f;
          financeChangeLogs.push(`${label}: [${oldVal || '0'}] ➡️ [${compareNew || '0'}]`);
        }
      });

      let userFinanceReason = document.getElementById('m-payNote').value.trim();
      const originalPayNote = (originalData.payNote || "").trim();

      if (financeChangeLogs.length > 0) {
        // Finance fields changed — require a reason
        if (!userFinanceReason) {
          alert("⚠️ 偵測到金額異動，請在「財務備註」內輸入本次異動原因。");
          document.getElementById('m-payNote').focus();
          return;
        }
        // Prepend audit trace + new reason on top of old notes (same pattern as adminNote)
        const financeTrace    = `--- 📅 ${now} (${adminName}) ---\n💰 變動：${financeChangeLogs.join('; ')}\n📝 原因：${userFinanceReason}\n\n`;
        updateData['payNote'] = financeTrace + (originalPayNote || "");
      } else {
        // No finance fields changed
        if (!userFinanceReason) {
          // Nothing changed and nothing typed — no need to save
          alert("ℹ️ 未偵測到任何金額異動。");
          return;
        }
        // User typed a new note without changing amounts — prepend it as a standalone entry
        const noteTrace       = `--- 📅 ${now} (${adminName}) ---\n📝 備註：${userFinanceReason}\n\n`;
        updateData['payNote'] = noteTrace + (originalPayNote || "");
      }

      // Coerce to number before sending
      ['totalDue','paid','subsidy'].forEach(f => {
        if (updateData[f] !== undefined) updateData[f] = Number(updateData[f] || 0);
      });

      await callUpdateAPI(rowId, updateData, adminName);
    }

    // =========================================
    // API 送出共用函式
    // =========================================
    async function callUpdateAPI(rowId, updateData, adminName) {
      const res = await api({
        action:    'updateParticipant',

        row:       rowId,
        data:      updateData,
        adminName: adminName

        fetchData();
      } else {
        alert("❌ 更新失敗：" + (res?.message || "未知錯誤"));
      }
    }

function createTableHtml(channels, categoryData) {
  const colTotals = {};
  let grandTotal = 0;
  
  // --- 新增：自定義排序權重字典 ---
  // 您可以在這裡定義任何想要優先呈現的文字及其順序（數字越小越前面）
  const sortWeight = {
    "是": 1, "否": 2,
    "男": 1, "女": 2,
    "國中": 1, "高中職": 2, "大專": 3, "社青": 4, "傳道": 5, "牧師": 6, "其他": 99,
    "第一次參加": 1, "曾參加過": 2, "未填": 100};

  // 取得所有類別並進行自定義排序
  const sortedKeys = Object.keys(categoryData).sort((a, b) => {
    const weightA = sortWeight[a] || 50; // 若不在字典內，預設權重為 50
    const weightB = sortWeight[b] || 50;
    
    if (weightA !== weightB) {
      return weightA - weightB; // 依權重排序
    }
    return a.localeCompare(b, 'zh-Hant'); // 權重相同則按筆畫排序
  });

  // --- 後續計算總計與建立表格的邏輯不變 ---
  Object.values(categoryData).forEach(channelMap => {
    channels.forEach(ch => { grandTotal += (channelMap[ch] || 0); });
  });

  let html = `<table class="stats-table"><thead><tr><th>類別</th>`;
  channels.forEach(ch => { html += `<th>${ch}</th>`; colTotals[ch] = 0; });
  html += `<th>小計</th><th>占比</th></tr></thead><tbody>`;

  // 使用我們排序過的 sortedKeys
  sortedKeys.forEach(val => {
    let rowTotal = 0;
    html += `<tr><td class="row-label"><strong>${val}</strong></td>`;
    channels.forEach(ch => {
      const count = categoryData[val][ch] || 0;
      html += `<td>${count}</td>`;
      rowTotal += count;
      colTotals[ch] += count;
    });
    const rowPercentage = grandTotal > 0 ? ((rowTotal / grandTotal) * 100).toFixed(1) : 0;
    html += `<td style="background:#f0f0f0;"><strong>${rowTotal}</strong></td>`;
    html += `<td style="color:#666;">${rowPercentage}%</td></tr>`;
  });

  // 頁尾總計邏輯保持不變...
  html += `</tbody><tfoot style="border-top:2px solid var(--shine-black); background:var(--shine-lime);">`;
  html += `<tr><td><strong>總計</strong></td>`;
  channels.forEach(ch => html += `<td><strong>${colTotals[ch]}</strong></td>`);
  html += `<td><strong>${grandTotal}</strong></td><td><strong>100%</strong></td></tr></tfoot></table>`;
  
  return html;
}

  window.print();
}


    // =========================================
    // 工具函式
    // =========================================
    function formatPhone(obj) {
      let val = obj.value.replace(/\D/g, '');
      if (val.length > 10) val = val.slice(0, 10);
      if (val.length > 4)  obj.value = val.slice(0, 4) + '-' + val.slice(4);
      else                 obj.value = val;
    }

    function attachModalListener() {
      const modal = document.getElementById('editModal');
      if (!modal.dataset.listenerAttached) {
        modal.addEventListener('change', e => {
          if (e.target.matches('input, select, textarea')) isModalDirty = true;
        });
        modal.dataset.listenerAttached = "true";
      }
    }

    window.addEventListener('beforeunload', e => {
      if (isModalDirty) { e.preventDefault(); e.returnValue = ''; }
    });
  </script>
